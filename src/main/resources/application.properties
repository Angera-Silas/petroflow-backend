# === Application ===
spring.application.name=petroflow-backend
spring.config.import=optional:file:.env[.properties]
app.data.init.enabled=${APP_DATA_INIT_ENABLED:false}
app.schema.init.enabled=${APP_SCHEMA_INIT_ENABLED:true}

# === Server ===
server.address=0.0.0.0
server.port=${PORT:8080}
server.servlet.context-path=/api
server.shutdown=graceful
server.servlet.session.timeout=30m

# === HTTP/2, Threads & Compression ===
server.http2.enabled=true
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=25
server.tomcat.accept-count=500
server.tomcat.max-connections=5000
server.tomcat.connection-timeout=20000
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/css,text/javascript
server.compression.min-response-size=1024

# === Database (Supabase PostgreSQL / Local PostgreSQL) ===
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/petroflow_dev}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pooling
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.initialization-fail-timeout=0

# === Hibernate/JPA ===
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.open-in-view=false

# === Redis (optional by default) ===
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.session.store-type=${SPRING_SESSION_STORE_TYPE:none}
spring.session.redis.namespace=petroflow:session
spring.data.redis.repositories.enabled=false
spring.data.redis.url=${REDIS_URL:redis://${SPRING_DATA_REDIS_HOST:${REDIS_HOST:localhost}}:${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}}
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:${REDIS_HOST:localhost}}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME:${REDIS_USERNAME:}}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}
spring.data.redis.timeout=6000

# Jedis direct connectivity check (based on Redis FAQ example)
app.redis.jedis.enabled=${APP_REDIS_JEDIS_ENABLED:true}
app.redis.jedis.test-on-startup=${APP_REDIS_JEDIS_TEST_ON_STARTUP:true}
app.redis.jedis.host=${SPRING_DATA_REDIS_HOST:${REDIS_HOST:localhost}}
app.redis.jedis.port=${SPRING_DATA_REDIS_PORT:${REDIS_PORT:6379}}
app.redis.jedis.username=${SPRING_DATA_REDIS_USERNAME:${REDIS_USERNAME:default}}
app.redis.jedis.password=${SPRING_DATA_REDIS_PASSWORD:${REDIS_PASSWORD:}}
app.redis.jedis.ssl=${REDIS_SSL_ENABLED:false}

# === Monitoring / Actuator ===
management.endpoints.web.base-path=/health
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# === Logging ===
logging.level.root=INFO
logging.level.com.angerasilas.petroflow_backend=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO

# === JWT ===
jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# === Mail ===
spring.mail.host=${SPRING_MAIL_HOST:${MAIL_HOST:smtp.gmail.com}}
spring.mail.port=${SPRING_MAIL_PORT:${MAIL_PORT:587}}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=5000

# === Error Handling ===
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false


