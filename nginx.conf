# ============================================================================
# NGINX CONFIGURATION FOR PETROFLOW BACKEND
# ============================================================================
# Production-grade Nginx configuration with:
# - Reverse proxy to backend instances
# - Load balancing across multiple backends
# - SSL/TLS encryption
# - Caching and compression
# - Security headers
# - Rate limiting

upstream petroflow_backend {
    # Multiple backend instances for load balancing (VMs/hosts/processes)
    # Replace these addresses with your actual backend host IPs/DNS names.
    server 127.0.0.1:8081 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8082 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:8083 weight=1 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=sync_limit:10m rate=50r/s;

# Cache settings
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=1g inactive=60m;
proxy_cache_path /var/cache/nginx/static levels=1:2 keys_zone=static_cache:10m max_size=500m inactive=1d;

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name api.petroflow.app;
    client_max_body_size 10M;

    # SSL certificates (use Let's Encrypt with certbot)
    ssl_certificate /etc/letsencrypt/live/api.petroflow.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.petroflow.app/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/xml+rss application/json
               application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Logging
    access_log /var/log/nginx/petroflow_access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/petroflow_error.log warn;

    # Health check endpoint (bypass cache)
    location /api/health {
        proxy_pass http://petroflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "upgrade";
        access_log off;
    }

    # Auth endpoints (rate limited)
    location /api/auth {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://petroflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
    }

    # Sync endpoints (higher rate limit)
    location /api/sync {
        limit_req zone=sync_limit burst=20 nodelay;
        proxy_pass http://petroflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # No caching for sync endpoints
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # Default API proxy
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://petroflow_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Cache only safe requests; bypass cache for authenticated traffic
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_no_cache $http_authorization;
        proxy_cache_bypass $http_authorization;
        add_header X-Cache-Status $upstream_cache_status;

        # Serve stale cache while refreshing/upstream unavailable
        proxy_cache_use_stale error timeout invalid_header updating http_500 http_502 http_503 http_504;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Root location
    location / {
        return 404;
    }
}

# Upstream monitoring
upstream health_check {
    # For internal monitoring
    server 127.0.0.1:8081;
    server 127.0.0.1:8082;
    server 127.0.0.1:8083;
}

# Stats server (internal only)
server {
    listen 127.0.0.1:8888;
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
