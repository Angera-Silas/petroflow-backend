# ============================================================================
# NGINX CONFIGURATION FOR LOCAL DEVELOPMENT (No Docker)
# ============================================================================
# Simplified configuration for local development on Parrot Linux
# - Single backend instance (localhost:8080)
# - No SSL/TLS (use http://localhost)
# - No load balancing
# - Basic rate limiting
# - Development-friendly logging

user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/petroflow_dev_error.log debug;

events {
    worker_connections 768;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format combined '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/petroflow_dev_access.log combined;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               text/x-component text/x-cross-domain-policy;

    # Rate limiting zones for development
    limit_req_zone $binary_remote_addr zone=dev_api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=dev_auth:10m rate=10r/s;

    # Upstream to local backend
    upstream petroflow_backend_dev {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    # HTTP server (development only - no SSL)
    server {
        listen 80;
        listen [::]:80;
        server_name localhost 127.0.0.1;

        client_max_body_size 50M;

        # Access logs
        access_log /var/log/nginx/petroflow_dev_access.log combined buffer=32k flush=1s;
        error_log /var/log/nginx/petroflow_dev_error.log debug;

        # Health check endpoint (bypass rate limiting)
        location /api/health {
            proxy_pass http://petroflow_backend_dev;
            proxy_http_version 1.1;
            proxy_set_header Connection "upgrade";
            proxy_redirect off;
            access_log off;
        }

        # Auth endpoints (rate limited for development)
        location /api/auth {
            limit_req zone=dev_auth burst=20 nodelay;

            proxy_pass http://petroflow_backend_dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;

            # Development: show what's being cached
            add_header X-Cache-Status $upstream_cache_status;
        }

        # Sync endpoints (higher rate limit)
        location /api/sync {
            limit_req zone=dev_api burst=50 nodelay;

            proxy_pass http://petroflow_backend_dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;

            # No caching for sync endpoints
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # Default API proxy with rate limiting
        location /api/ {
            limit_req zone=dev_api burst=100 nodelay;

            proxy_pass http://petroflow_backend_dev;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header Host $host;

            # Timeouts for development
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Root location
        location / {
            return 404;
        }
    }

    # Development stats server (localhost only)
    server {
        listen 127.0.0.1:8888;
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            deny all;
        }
    }
}
